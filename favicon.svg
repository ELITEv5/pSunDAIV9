<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="core" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#ffe880"/>
      <stop offset="100%" stop-color="#c87010"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5c842" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f5c842" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#0d0b08"/>
  <!-- Ambient glow -->
  <circle cx="50" cy="50" r="48" fill="url(#glow)"/>
  <!-- 8 rays, rotated around center -->
  <g fill="#f5c842">
    <rect x="47" y="9"  width="6" height="15" rx="3" transform="rotate(  0 50 50)"/>
    <rect x="47" y="9"  width="6" height="15" rx="3" transform="rotate( 45 50 50)"/>
    <rect x="47" y="9"  width="6" height="15" rx="3" transform="rotate( 90 50 50)"/>
    <rect x="47" y="9"  width="6" height="15" rx="3" transform="rotate(135 50 50)"/>
    <rect x="47" y="9"  width="6" height="15" rx="3" transform="rotate(180 50 50)"/>
    <rect x="47" y="9"  width="6" height="15" rx="3" transform="rotate(225 50 50)"/>
    <rect x="47" y="9"  width="6" height="15" rx="3" transform="rotate(270 50 50)"/>
    <rect x="47" y="9"  width="6" height="15" rx="3" transform="rotate(315 50 50)"/>
  </g>
  <!-- Sun core -->
  <circle cx="50" cy="50" r="22" fill="url(#core)"/>
</svg>
